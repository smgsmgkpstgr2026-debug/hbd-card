<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ucapan Ulang Tahun - Elegan</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-blue: #0f2027;
            --mid-blue: #203a43;
            --silver: #c0c0c0;
            --gold-accent: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            background: #000000; /* Warna hitam polos untuk latar belakang PC/Laptop */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card-frame {
            /* --- MEMBUAT FULL SCREEN DI HP --- */
            width: 100%;
            max-width: 500px; /* Membatasi lebar maksimal agar tidak terlalu melar jika dibuka di PC */
            height: 100vh; /* Fallback untuk browser lama */
            height: 100dvh; /* Memenuhi layar tinggi penuh termasuk area navigasi HP */
            border: none; /* Menghilangkan border luar */
            border-radius: 0; /* Menghilangkan lengkungan sudut agar rata dengan layar HP */
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box; /* Memastikan padding tidak menambah ukuran frame */
            text-align: center;
            
            /* --- PENGATURAN BACKGROUND IMAGE --- */
            background-image: url('bg-kartu.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: var(--mid-blue);
        }

        /* Overlay gelap transparan agar teks selalu terbaca di atas background apa pun */
        .card-frame::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); /* Efek gelap 40% */
            border-radius: 0; /* Menyesuaikan frame */
            z-index: 0;
        }

        /* Border perak di dalam kartu (ornamen) */
        .card-frame::before {
            content: '';
            position: absolute;
            top: 20px; left: 20px; right: 20px; bottom: 20px; /* Jarak border dari tepi layar */
            border: 1.5px solid rgba(192, 192, 192, 0.6); /* Warna silver dengan sedikit transparansi */
            border-radius: 15px; /* Lengkungan khusus untuk border dalam */
            pointer-events: none;
            z-index: 1;
        }

        /* Pastikan konten berada di atas overlay background */
        .slide, .progress-dots {
            z-index: 2; 
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s ease;
        }

        .slide.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--silver);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        h2 {
            font-weight: 400;
            letter-spacing: 2px;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .photo-frame {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 3px solid var(--gold-accent);
            margin: 20px auto 10px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .age-text {
            font-size: 1.5rem; 
            font-family: 'Playfair Display', serif;
            color: var(--gold-accent);
            margin-bottom: 10px;
            padding: 0 10px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .verse-container {
            font-style: italic;
            line-height: 1.8;
            font-size: 1rem;
            padding: 0 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .verse-ref {
            display: block;
            margin-top: 15px;
            color: var(--gold-accent);
            font-weight: bold;
        }

        .btn {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--silver);
            color: var(--silver);
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: var(--silver);
            color: var(--deep-blue);
        }

        .btn-primary {
            background: var(--gold-accent);
            border-color: var(--gold-accent);
            color: var(--deep-blue);
            font-weight: bold;
        }
        
        .progress-dots {
            position: absolute;
            bottom: 40px; /* Dinaikkan sedikit agar tidak tertutup tombol navigasi HP */
            display: flex;
            gap: 10px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        .dot.active {
            background: var(--silver);
            box-shadow: 0 0 5px white;
        }
        
    </style>
</head>
<body>

    <audio id="bg-music" loop preload="auto">
        <source src="happy_birthday.mp3" type="audio/mpeg">
        <source src="https://upload.wikimedia.org/wikipedia/commons/transcoded/6/61/Happy_Birthday_to_You_-_instrumental.ogg/Happy_Birthday_to_You_-_instrumental.ogg.mp3" type="audio/mpeg">
    </audio>

    <div class="card-frame">
        
        <div class="slide active" id="slide-1">
            <h1 style="font-size: 2rem;">Kartu Ucapan</h1>
            <p>Spesial untuk:</p>
            <h2 id="name-display-1" style="color: var(--gold-accent); font-size: 1.5rem; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);">[Nama]</h2>
            <button class="btn btn-primary" onclick="startExperience()">Buka Kartu</button>
        </div>

        <div class="slide" id="slide-2">
            <h1>Selamat Ulang Tahun</h1>
            
            <div class="photo-frame">
                <img src="profil.jpg" alt="Profil">
            </div>

            <div class="age-text" id="age-display">XX</div>
            
            <p style="text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">Tahun Berkat & Penyertaan Tuhan</p>
            <button class="btn" onclick="nextSlide(3)">Lihat Ayat >> </button>
        </div>

        <div class="slide" id="slide-3">
            <div class="verse-container">
                "Ajarlah kami menghitung hari-hari kami sedemikian, hingga kami beroleh hati yang bijaksana."
                <span class="verse-ref">Mazmur 90:12</span>
            </div>
            <button class="btn" onclick="nextSlide(4)">Lanjut >> </button>
        </div>

        <div class="slide" id="slide-4">
            <p style="text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">Tuhan Yesus Memberkati senantiasa dengan kesehatan dan sukacita.</p>
            <br>
            <hr style="width: 50%; opacity: 0.5; border-color: var(--silver);">
            <br>
            <p style="font-size: 0.9rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">Salam Kasih,</p>
            <h3 id="sender-display" style="color: var(--gold-accent); text-shadow: 1px 1px 3px rgba(0,0,0,0.8);">[Pengirim]</h3>
            <button class="btn" onclick="nextSlide(1)">Ulangi</button>
        </div>

        <div class="progress-dots">
            <div class="dot active" id="dot-1"></div>
            <div class="dot" id="dot-2"></div>
            <div class="dot" id="dot-3"></div>
            <div class="dot" id="dot-4"></div>
        </div>
    </div>

    <script>
        const config = {
            nama: "St. Gibson Simarmata",
            umur: "Hari ini aku bersyukur untuk satu tahun kehidupan lagi", 
            pengirim: "Girsang-Boru-Panagolan Wil.3 Tangerang"
        };

        document.getElementById('name-display-1').innerText = config.nama;
        document.getElementById('age-display').innerText = config.umur;
        document.getElementById('sender-display').innerText = config.pengirim;

        const music = document.getElementById('bg-music');

        function startExperience() {
            attemptPlayMusic();
            nextSlide(2);
        }

        function attemptPlayMusic() {
            music.volume = 1.0; 
            music.muted = false;
            var promise = music.play();
            if (promise !== undefined) {
                promise.then(_ => {}).catch(error => {
                    console.log("Autoplay dicegah.");
                });
            }
        }

        function nextSlide(slideIndex) {
            document.querySelectorAll('.slide').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.dot').forEach(el => el.classList.remove('active'));
            document.getElementById('slide-' + slideIndex).classList.add('active');
            document.getElementById('dot-' + slideIndex).classList.add('active');
        }
    </script>
</body>
</html>
